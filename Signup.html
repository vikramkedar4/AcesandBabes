<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Join — Aces & Babes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#f0ece3;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{position:relative;z-index:1;width:100%;max-width:440px;border:1px solid rgba(212,175,55,.2);background:rgba(255,255,255,.02);padding:48px 40px;}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:8px;}
.logo span{color:#d4af37;}
.tagline{text-align:center;font-size:13px;color:rgba(240,236,227,.4);letter-spacing:1px;margin-bottom:40px;}
.divider{width:40px;height:2px;background:linear-gradient(90deg,#d4af37,transparent);margin:0 auto 40px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(240,236,227,.5);margin-bottom:8px;}
.field input{width:100%;padding:14px 16px;background:rgba(240,236,227,.05);border:1px solid rgba(212,175,55,.2);color:#f0ece3;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:#d4af37;}
.field input::placeholder{color:rgba(240,236,227,.25);}
.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#d4af37,#f4d03f,#d4af37);color:#0a0a0a;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.error{background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);color:#ff8080;padding:12px 16px;font-size:14px;margin-bottom:20px;display:none;}
.success{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:#d4af37;padding:12px 16px;font-size:14px;margin-bottom:20px;display:none;}
.footer-link{text-align:center;margin-top:24px;font-size:14px;color:rgba(240,236,227,.4);}
.footer-link a{color:#d4af37;text-decoration:none;}
.back{display:block;text-align:center;margin-bottom:32px;font-size:13px;color:rgba(240,236,227,.4);text-decoration:none;}
.back:hover{color:#d4af37;}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back">← Back to home</a>
  <div class="logo">Aces <span>&</span> Babes</div>
  <p class="tagline">Create your account</p>
  <div class="divider"></div>
  <div class="error" id="errorMsg"></div>
  <div class="success" id="successMsg"></div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="yourname" autocomplete="off"/>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@email.com"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="min. 6 characters"/>
  </div>
  <button class="submit-btn" id="signupBtn" onclick="handleSignup()">Join the Game</button>
  <div class="footer-link">Already have an account? <a href="/Login.html">Log in</a></div>
</div>
<script>
var SUPABASE_URL = 'https://xtjlgzpnkcsuiqinzxvk.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0amxnenBua2NzdWlxaW56eHZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0NzMwNzYsImV4cCI6MjA2MDA0OTA3Nn0.BmydaJVFy-o28OyrgE60pHTZBYwfomkbcGKBHaz6zuWg';
var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showError(msg){var el=document.getElementById('errorMsg');el.textContent=msg;el.style.display='block';document.getElementById('successMsg').style.display='none';}
function showSuccess(msg){var el=document.getElementById('successMsg');el.textContent=msg;el.style.display='block';document.getElementById('errorMsg').style.display='none';}

async function handleSignup(){
  var username=document.getElementById('username').value.trim().toLowerCase();
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('signupBtn');
  if(!username||!email||!password)return showError('All fields are required.');
  if(username.length<3)return showError('Username must be at least 3 characters.');
  if(password.length<6)return showError('Password must be at least 6 characters.');
  btn.disabled=true;btn.textContent='Creating account...';
  try{
    var signupResult=await db.auth.signUp({email:email,password:password});
    if(signupResult.error){btn.disabled=false;btn.textContent='Join the Game';return showError(signupResult.error.message);}
    var profileResult=await db.from('profiles').insert({id:signupResult.data.user.id,username:username,full_name:username});
    if(profileResult.error){btn.disabled=false;btn.textContent='Join the Game';return showError('Profile error: '+profileResult.error.message);}
    showSuccess('Account created! Redirecting...');
    setTimeout(function(){window.location.href='/Dashboard.html';},1500);
  }catch(err){btn.disabled=false;btn.textContent='Join the Game';showError('Error: '+err.message);}
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')handleSignup();});
</script>
</body>
</html>
